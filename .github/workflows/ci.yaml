name: CI Workflow

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX documents
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            main.tex
            mainfr.tex

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: latex-pdfs
          path: |
            main.pdf
            mainfr.pdf

      - name: Summary
        run: |
          echo "CI workflow completed successfully." >> $GITHUB_STEP_SUMMARY
          echo "Generated PDF files:" >> $GITHUB_STEP_SUMMARY
          echo "- main.pdf" >> $GITHUB_STEP_SUMMARY
          echo "- mainfr.pdf" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts name: latex-pdfs" >> $GITHUB_STEP_SUMMARY
